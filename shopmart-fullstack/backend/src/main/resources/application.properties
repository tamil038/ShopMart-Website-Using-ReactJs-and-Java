# --- Server ---------------------------------------------------------------
server.port=8090

# --- H2 file-based database -------------------------------------------------
# Persists to ./data/shopmartdb.mv.db (relative to where you run the app from)
spring.datasource.url=jdbc:h2:file:./data/shopmartdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT ----------------------------------------------------------------
# Change this secret before deploying anywhere real. Must be >= 32 characters for HS256.
app.jwt.secret=shopmart-super-secret-signing-key-change-this-in-production-135790
app.jwt.expiration-ms=86400000

# --- CORS: allow the React (Vite) dev server, plus the legacy Angular port --
app.cors.allowed-origins=http://localhost:5173,http://localhost:4200
